name: JihunSMP
version: 1.1.0
main: com.jihun.jihunSMP
api-version: '1.20'
description: JihunSMP PvP, economy, bounty, shop and enhancement plugin
commands:
  tpa:
    description: 텔레포트 요청
    usage: /tpa <플레이어>
  tpaccept:
    description: 텔레포트 요청 수락
    usage: /tpaccept <플레이어>
  tpadeny:
    description: 텔레포트 요청 거절
    usage: /tpadeny <플레이어>
  locate:
    description: 다이아몬드 5개로 플레이어 위치 추적
    usage: /locate <플레이어>
  coins:
    description: 코인 확인
    usage: /coins
  coin:
    description: 관리자 코인 설정
    usage: /coin <give|take|set> <플레이어> <금액>
    permission: jihunsmp.admin
  bounty:
    description: 현상금 순위 확인
    usage: /bounty
  shop:
    description: 코인 상점
    usage: /shop [buy 번호]
  team:
    description: 팀 참가
    usage: /team <RED|BLUE>
  myteam:
    description: 내 팀 확인
    usage: /myteam
  kills:
    description: 킬 수 확인
    usage: /kills
permissions:
  jihunsmp.admin:
    description: 관리자 코인 명령어 권한
    default: op
